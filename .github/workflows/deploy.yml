name: Build and Deploy on Docker Hub

on: 
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v2
        with: 
          context: .
          file: ./docker/Dockerfile.user
          push: true
          tags: rajveersingh7896/payment-app-user:latest

      - name: Verify Pushed image
        run: docker pull rajveersingh7896/payment-app-user:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with: 
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }} 
          key: ${{ secrets.SSH_KEY }}
          script: |
            sudo docker pull rajveersingh7896/payment-app-user:latest 
            sudo docker stop payment-app-user || true
            sudo docker rm payment-app-user || true
            sudo docker run -d --name payment-app-user --restart always -e "DATABASE_URL=${{ secrets.DB_URL }}" -p 3005:3000 rajveersingh7896/payment-app-user:latest